<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️ Un Mensaje Especial ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(-45deg,#ff4d6d,#ff758f,#ff9a9e,#fad0c4);
    background-size:400% 400%;
    animation:fondo 12s ease infinite;
}

@keyframes fondo{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.contenedor{
    text-align:center;
    padding:50px;
    background:rgba(255,255,255,.12);
    backdrop-filter:blur(10px);
    border-radius:30px;
    border:2px solid rgba(255,255,255,.35);
    box-shadow:0 0 40px rgba(255,255,255,.4);
}

h1{
    font-size:70px;
    color:white;
    text-shadow:
        0 0 10px #fff,
        0 0 20px #ff0080,
        0 0 40px #ff0080,
        0 0 60px #ff0080;
    animation:latido 1.5s infinite;
}

p{
    margin-top:25px;
    font-size:28px;
    color:white;
}

@keyframes latido{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.08);}
}

.corazon{
    position:absolute;
    color:white;
    animation:subir linear infinite;
    opacity:.8;
}

@keyframes subir{
    from{
        transform:translateY(100vh) scale(.5);
    }
    to{
        transform:translateY(-120px) scale(1.3);
    }
}
</style>

</head>
<body>

<div class="contenedor">
    <h1>❤️ Womvalen y When ❤️</h1>
    <p>✨ Que viva el amor. ✨</p>
</div>

<script>
function crearCorazon(){
    const c=document.createElement("div");
    c.classList.add("corazon");
    c.innerHTML="❤";
    c.style.left=Math.random()*100+"vw";
    c.style.fontSize=(20+Math.random()*40)+"px";
    c.style.animationDuration=(4+Math.random()*6)+"s";
    document.body.appendChild(c);

    setTimeout(()=>{
        c.remove();
    },10000);
}

setInterval(crearCorazon,200);
</script>

</body>
</html>
